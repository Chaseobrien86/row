<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Portfolio</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);
  --border: rgba(255, 255, 255, 0.06);
  --border-strong: rgba(255, 255, 255, 0.12);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;
  --success: #6BE3A4;
  --danger: #FF6B6B;
  --warning: #F2C063;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
*::-webkit-scrollbar { display: none; }
body {
  padding: max(24px, env(safe-area-inset-top)) 16px 16px;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: -10%;
  z-index: -2;
  background:
    radial-gradient(60% 50% at 80% 10%, rgba(224, 118, 88, 0.14) 0%, transparent 55%),
    radial-gradient(50% 45% at 20% 88%, rgba(107, 227, 164, 0.07) 0%, transparent 55%);
  filter: blur(40px);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
}

.page { max-width: 680px; margin: 0 auto; }

/* ── Header ── */
.port-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 24px;
}
.port-eyebrow {
  font: 700 10px/1 var(--font-mono);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 9px;
}
.port-total {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -0.04em;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.port-today {
  margin-top: 8px;
  font-family: var(--font-mono);
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  color: var(--text-tertiary);
  transition: color 0.3s;
}
.port-today.c-pos { color: var(--success); }
.port-today.c-neg { color: var(--danger); }
.port-meta {
  margin-top: 5px;
  font-size: 11px;
  color: var(--text-quaternary);
  font-family: var(--font-mono);
}

.refresh-btn {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 10px 16px;
  border: 1px solid var(--border-strong);
  border-radius: 12px;
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
  transition: background 0.15s, color 0.15s, transform 0.1s;
}
.refresh-btn:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.refresh-btn:active { transform: scale(0.97); }
.refresh-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
.refresh-icon { font-size: 16px; line-height: 1; display: inline-block; }
.refresh-icon.spin { animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Section label ── */
.sect-label {
  font: 700 10px/1 var(--font-mono);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.sect-label::before {
  content: '';
  width: 16px; height: 1px;
  background: var(--text-tertiary);
  opacity: 0.5;
}
.sect-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.07), transparent);
}

/* ── Error banner ── */
.err-banner {
  display: none;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 16px;
  margin-bottom: 16px;
  background: rgba(255, 107, 107, 0.07);
  border: 1px solid rgba(255, 107, 107, 0.22);
  border-radius: 12px;
  font-size: 12px;
  color: #FF9999;
  font-family: var(--font-mono);
  line-height: 1.5;
}
.err-banner.show { display: flex; }

/* ── Position cards ── */
.pos-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 22px;
}
.pos-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 4px 24px rgba(0,0,0,0.32);
  transition: background 0.15s;
  position: relative;
  overflow: hidden;
}
.pos-card:hover { background: rgba(255,255,255,0.055); }
/* Side accent bar */
.pos-card::before {
  content: '';
  position: absolute;
  left: 0; top: 14px; bottom: 14px;
  width: 3px;
  border-radius: 0 2px 2px 0;
  background: var(--border-strong);
  transition: background 0.4s, box-shadow 0.4s;
}
.pos-card.perf-pos::before {
  background: var(--success);
  box-shadow: 0 0 10px rgba(107,227,164,0.45);
}
.pos-card.perf-neg::before {
  background: var(--danger);
  box-shadow: 0 0 10px rgba(255,107,107,0.45);
}

.pos-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.pos-symbol {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: 0.02em;
  color: var(--text-primary);
  line-height: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.pos-name {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
  line-height: 1.3;
}
.pos-price-col { text-align: right; flex-shrink: 0; }
.pos-price {
  font-size: 20px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.025em;
  color: var(--text-primary);
  line-height: 1;
}
.pos-day {
  font-family: var(--font-mono);
  font-size: 11.5px;
  font-variant-numeric: tabular-nums;
  margin-top: 4px;
  color: var(--text-tertiary);
}

.pos-bottom {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 8px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.pos-meta {
  font-size: 11px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  line-height: 1.6;
}
.pos-meta b {
  color: var(--text-secondary);
  font-weight: 600;
}
.pos-value-col { text-align: right; }
.pos-total-val {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
  line-height: 1;
}
.pos-gl {
  font-family: var(--font-mono);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  margin-top: 3px;
}

/* ── Cash row ── */
.cash-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 15px 18px;
  margin-bottom: 22px;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 4px 20px rgba(0,0,0,0.28);
}
.cash-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
}
.cash-sub {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 3px;
  font-family: var(--font-mono);
}
.cash-amt {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
}

/* ── Summary card ── */
.summary-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 8px 36px rgba(0,0,0,0.40);
  margin-bottom: 20px;
}
.summ-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 13px 18px;
}
.summ-row + .summ-row { border-top: 1px solid var(--border); }
.summ-row.total {
  background: rgba(255,255,255,0.025);
  padding: 16px 18px;
}
.summ-row.total .summ-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
}
.summ-row.total .summ-val { font-size: 20px; }
.summ-label {
  font-size: 12px;
  color: var(--text-tertiary);
}
.summ-rhs { text-align: right; }
.summ-val {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
}
.summ-hint {
  font-size: 10px;
  color: var(--text-quaternary);
  font-family: var(--font-mono);
  margin-top: 2px;
  letter-spacing: 0.02em;
}

/* ── Colour utilities ── */
.c-pos { color: var(--success) !important; }
.c-neg { color: var(--danger)  !important; }
.c-neu { color: var(--text-tertiary) !important; }

/* ── Stale pill ── */
.stale-pill {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: 999px;
  background: rgba(242,192,99,0.10);
  border: 1px solid rgba(242,192,99,0.22);
  color: var(--warning);
  font-size: 9px;
  font-family: var(--font-mono);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  vertical-align: middle;
}

.ndash { color: var(--text-quaternary); font-family: var(--font-mono); }

@media (max-width: 480px) {
  .port-total { font-size: 32px; }
  .pos-price  { font-size: 17px; }
  .pos-total-val { font-size: 13px; }
  .summ-row.total .summ-val { font-size: 16px; }
  .cash-amt { font-size: 16px; }
}
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="port-header">
    <div>
      <div class="port-eyebrow">Merrill Lynch &nbsp;·&nbsp; Portfolio</div>
      <div class="port-total" id="portTotal">—</div>

    <div>
      <div class="cash-label">Cash &amp; Equivalents</div>

  <div class="sect-label">Summary</div>

    <div class="summ-row total">
      <div class="summ-label">Total Portfolio Value</div>
      <div class="summ-rhs">
        <div class="summ-val" id="summTotal">—</div>

    </div>
    <div class="summ-row">
      <div class="summ-label">Today's P&amp;L</div>
      <div class="summ-rhs">
        <div class="summ-val" id="summToday">—</div>
      </div>

    <div class="summ-row">
      <div class="summ-label">Total Unrealized G/L</div>

      </div>
    </div>
  </div>

</div><!-- /page -->

<script>
(function () {
'use strict';

/* ── Config ─────────────────────────────────────────────── */
const AV_KEY   = 'ILDUU7WG6MWRTF25';
const AV_BASE  = 'https://www.alphavantage.co/query';
const CACHE_MS = 15 * 60 * 1000; // 15 minutes — preserves 25 req/day limit

const SB_URL = 'https://rsoobyusmktmoewlcjnq.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzb29ieXVzbWt0bW9ld2xjam5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODE2MDgsImV4cCI6MjA5NTU1NzYwOH0.erJXvbrZclXGVRAOp52cBD4Dzp6_BDiKyF0MupsBT1g';
const SB_ROW = 'finance_portfolio';

const CASH = 7894.09;

// term: 'long' = held >1 yr (long-term capital gains rate)
//       'short' = held <1 yr (ordinary income rate)
const POSITIONS = [
  { symbol: 'TQQQ', name: 'ProShares UltraPro QQQ',        shares: 4954, avgCost: 18.57,  term: 'long' },
  { symbol: 'TSM',  name: 'Taiwan Semiconductor Mfg. Co.', shares: 5,    avgCost: 216.01, term: 'long' },
  { symbol: 'NLR',  name: 'VanEck Uranium+Nuclear ETF',    shares: 10,   avgCost: 104.84, term: 'long' },
  { symbol: 'AI',   name: 'C3.ai, Inc.',                   shares: 4,    avgCost: 26.00,  term: 'long' },
  { symbol: 'QTUM', name: 'Defiance Quantum ETF',          shares: 2,    avgCost: 92.53,  term: 'long' },
  { symbol: 'MRVL', name: 'Marvell Technology, Inc.',      shares: 1,    avgCost: 69.41,  term: 'long' },
];

/* ── State ───────────────────────────────────────────────── */
// cache[symbol] = { price, change, changePercent, prevClose, fetchedAt }
let cache = {};
let supa  = null;
let busy  = false;

/* ── Format helpers ─────────────────────────────────────── */
function fmt$(n, dp) {
  dp = dp == null ? 2 : dp;
  if (n == null || isNaN(n)) return '—';
  const s = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: dp, maximumFractionDigits: dp });
  return (n < 0 ? '-$' : '$') + s;
}
function fmtSgn$(n) {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+$' : '-$') + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function cCls(n) {
  if (n == null || isNaN(n)) return 'c-neu';
  return n > 0 ? 'c-pos' : n < 0 ? 'c-neg' : 'c-neu';
}
function timeAgo(ts) {
  if (!ts) return '';
  const s = Math.round((Date.now() - ts) / 1000);
  if (s <  5)  return 'just now';
  if (s < 60)  return s + 's ago';
  const m = Math.round(s / 60);
  if (m < 60)  return m + 'm ago';
  return Math.round(m / 60) + 'h ago';
}
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

/* ── LocalStorage cache ──────────────────────────────────── */
function cacheLoad() {
  try {
    var raw = localStorage.getItem('portPriceCache_v1');
    if (raw) cache = JSON.parse(raw) || {};
  } catch (_) {}
}
function cacheSave() {
  try { localStorage.setItem('portPriceCache_v1', JSON.stringify(cache)); } catch (_) {}
}

/* ── Supabase ────────────────────────────────────────────── */
async function supaInit() {
  if (!window.supabase) return;
  supa = window.supabase.createClient(SB_URL, SB_KEY);
  try {
    var res = await supa.from('app_state').select('data').eq('key', SB_ROW).maybeSingle();
    if (!res.error && res.data && res.data.data && res.data.data.priceCache) {
      var remote = res.data.data.priceCache;
      Object.keys(remote).forEach(function(sym) {
        if (!cache[sym] || remote[sym].fetchedAt > (cache[sym] ? cache[sym].fetchedAt : 0)) {
          cache[sym] = remote[sym];
        }
      });
      cacheSave();
    }
  } catch (_) {}
}
async function supaSave() {
  if (!supa) return;
  try {
    await supa.from('app_state').upsert(
      { key: SB_ROW, data: { priceCache: cache }, updated_at: new Date().toISOString() },
      { onConflict: 'key' }
    );
  } catch (_) {}
}

/* ── Alpha Vantage ───────────────────────────────────────── */
async function fetchSymbol(sym) {
  var url = AV_BASE + '?function=GLOBAL_QUOTE&symbol=' + sym + '&apikey=' + AV_KEY;
  var res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  var json = await res.json();
  if (json.Note || json.Information) {
    var e = new Error(json.Note || json.Information);
    e.rateLimited = true;
    throw e;
  }
  var q = json['Global Quote'];
  if (!q || !q['05. price']) throw new Error('No data for ' + sym);
  return {
    price:         parseFloat(q['05. price']),
    change:        parseFloat(q['09. change']),
    changePercent: parseFloat((q['10. change percent'] || '0').replace('%', '')),
    prevClose:     parseFloat(q['08. previous close']),
    fetchedAt:     Date.now()
  };
}

async function fetchAll(force) {
  if (busy) return;

  // Skip fetch if every symbol is cached and fresh
  if (!force) {
    var fresh = POSITIONS.every(function(p) {
      var c = cache[p.symbol];
      return c && (Date.now() - c.fetchedAt) < CACHE_MS;
    });
    if (fresh) { renderAll(); return; }
  }

  busy = true;
  setLoading(true);
  hideError();

  var errs = [];
  var rateLimited = false;

  for (var i = 0; i < POSITIONS.length; i++) {
    var sym = POSITIONS[i].symbol;
    if (rateLimited) { errs.push(sym); continue; }
    try {
      cache[sym] = await fetchSymbol(sym);
    } catch (e) {
      errs.push(sym);
      if (e.rateLimited) rateLimited = true;
    }
    // 220 ms gap keeps us under 5 req/min burst limit
    if (i < POSITIONS.length - 1 && !rateLimited) await sleep(220);
  }

  if (errs.length) {
    var msg = rateLimited
      ? 'API rate limit reached (25 req/day free tier). Showing cached data. Try again later.'
      : 'Could not load: ' + errs.join(', ') + '. Showing cached data where available.';
    showError(msg);
  }

  cacheSave();
  await supaSave();
  renderAll();

  busy = false;
  setLoading(false);
}

/* ── UI helpers ──────────────────────────────────────────── */
function setLoading(on) {
  var btn  = document.getElementById('refreshBtn');
  var icon = document.getElementById('refreshIcon');
  btn.disabled = on;
  icon.classList.toggle('spin', on);
}
function showError(msg) {
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errBanner').classList.add('show');
}
function hideError() {
  document.getElementById('errBanner').classList.remove('show');
}

/* ── Render ──────────────────────────────────────────────── */
function renderAll() {
  renderHeader();
  renderPositions();
  renderSummary();
}

function renderHeader() {
  var stocksVal = 0, todayPnl = 0, oldestFetch = Infinity;
  var allHave = true;

  POSITIONS.forEach(function(p) {
    var q = cache[p.symbol];
    if (!q) { allHave = false; return; }
    stocksVal += q.price * p.shares;
    todayPnl  += q.change * p.shares;
    if (q.fetchedAt < oldestFetch) oldestFetch = q.fetchedAt;
  });

  if (allHave) {
    var total   = stocksVal + CASH;
    var prevStk = stocksVal - todayPnl;
    var pct     = prevStk > 0 ? (todayPnl / prevStk) * 100 : 0;
    document.getElementById('portTotal').textContent = fmt$(total);
    var todayEl = document.getElementById('portToday');
    todayEl.textContent = fmtSgn$(todayPnl) + ' (' + fmtPct(pct) + ') today';
    todayEl.className   = 'port-today ' + cCls(todayPnl);
    document.getElementById('portMeta').textContent = 'Updated ' + timeAgo(oldestFetch);
  } else if (Object.keys(cache).length > 0) {
    document.getElementById('portTotal').textContent = fmt$(stocksVal + CASH) + '…';
    document.getElementById('portMeta').textContent = 'Partial data · tap Refresh';
  } else {
    document.getElementById('portTotal').textContent = '—';
    document.getElementById('portMeta').textContent = 'Tap Refresh to load live prices';
  }
}

function renderPositions() {
  var list = document.getElementById('posList');
  list.innerHTML = '';

  POSITIONS.forEach(function(p) {
    var q     = cache[p.symbol];
    var cost  = p.shares * p.avgCost;
    var val   = q ? q.price * p.shares : null;
    var gl    = val != null ? val - cost : null;
    var glPct = gl != null && cost > 0 ? (gl / cost) * 100 : null;
    var isStale = q && (Date.now() - q.fetchedAt) > CACHE_MS;

    var perfCls = gl != null ? (gl > 0 ? ' perf-pos' : gl < 0 ? ' perf-neg' : '') : '';
    var card = document.createElement('div');
    card.className = 'pos-card' + perfCls;

    var stalePill = isStale ? ' <span class="stale-pill">stale</span>' : '';

    var priceHTML = q ? esc(fmt$(q.price)) : '<span class="ndash">—</span>';
    var dayHTML   = q
      ? '<span class="' + cCls(q.change) + '">'
        + esc((q.change >= 0 ? '+' : '') + fmt$(q.change))
        + ' (' + esc(fmtPct(q.changePercent)) + ')'
        + '</span>'
      : '<span class="ndash">—</span>';
    var valHTML = val != null ? esc(fmt$(val)) : '<span class="ndash">—</span>';
    var glHTML  = gl != null
      ? '<span class="' + cCls(gl) + '">'
        + esc(fmtSgn$(gl)) + ' (' + esc(fmtPct(glPct)) + ')'
        + '</span>'
      : '<span class="ndash">—</span>';

    card.innerHTML =
      '<div class="pos-top">'
      + '<div>'
      +   '<div class="pos-symbol">' + esc(p.symbol) + stalePill + '</div>'
      +   '<div class="pos-name">' + esc(p.name) + '</div>'
      + '</div>'
      + '<div class="pos-price-col">'
      +   '<div class="pos-price">' + priceHTML + '</div>'
      +   '<div class="pos-day">' + dayHTML + '</div>'
      + '</div>'
      + '</div>'
      + '<div class="pos-bottom">'
      +   '<div class="pos-meta"><b>' + p.shares.toLocaleString('en-US') + '</b> shares<br>avg ' + esc(fmt$(p.avgCost)) + '</div>'
      +   '<div class="pos-value-col">'
      +     '<div class="pos-total-val">' + valHTML + '</div>'
      +     '<div class="pos-gl">' + glHTML + '</div>'
      +   '</div>'
      + '</div>';

    list.appendChild(card);
  });
}

function renderSummary() {
  var stocksVal = 0, costBasis = 0, todayPnl = 0, ltGl = 0, stGl = 0;
  var allHave = POSITIONS.every(function(p) { return !!cache[p.symbol]; });

  POSITIONS.forEach(function(p) {
    var q   = cache[p.symbol];
    var cst = p.shares * p.avgCost;
    costBasis += cst;
    if (!q) return;
    var v = q.price * p.shares;
    stocksVal += v;
    todayPnl  += q.change * p.shares;
    var gl = v - cst;
    if (p.term === 'short') stGl += gl; else ltGl += gl;
  });

  var total   = stocksVal + CASH;
  var totalGl = stocksVal - costBasis;
  var glPct   = costBasis > 0 ? (totalGl / costBasis) * 100 : 0;
  var prevStk = stocksVal - todayPnl;
  var tPct    = prevStk > 0 ? (todayPnl / prevStk) * 100 : 0;
  var ltPct   = costBasis > 0 ? (ltGl / costBasis) * 100 : 0;

  function set(id, text, cls) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.className = 'summ-val' + (cls ? ' ' + cls : '');
  }

  if (allHave) {
    set('summTotal',  fmt$(total));
    set('summToday',  fmtSgn$(todayPnl) + ' (' + fmtPct(tPct) + ')',   cCls(todayPnl));
    set('summGl',     fmtSgn$(totalGl)  + ' (' + fmtPct(glPct) + ')',  cCls(totalGl));
    set('summStGl',   stGl === 0 ? '$0.00' : fmtSgn$(stGl),             cCls(stGl));
    set('summLtGl',   fmtSgn$(ltGl)     + ' (' + fmtPct(ltPct) + ')',  cCls(ltGl));
  }
}

/* ── Boot ────────────────────────────────────────────────── */
document.getElementById('refreshBtn').addEventListener('click', function() { fetchAll(true); });

async function init() {
  cacheLoad();
  renderAll();        // show localStorage data immediately
  await supaInit();
  renderAll();        // re-render after merging Supabase cache
  await fetchAll(false); // fetch only if stale
}

init();
})();
</script>
</body>
</html>
